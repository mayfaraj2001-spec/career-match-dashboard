<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta
    name="description"
    content="CareerMatch Dashboard helps job seekers find, save and track technology jobs."
  >

  <title>CareerMatch Dashboard</title>

  <link rel="stylesheet" href="src/style.css">
</head>

<body>
  <header class="app-header">
    <h1>CareerMatch Dashboard</h1>
    <p>Find, save and track your next technology job.</p>
  </header>

  <main class="container">
    <section class="dashboard" aria-label="Job search summary">
      <article class="summary-card">
        <h3>Total Jobs</h3>
        <p id="totalJobs">0</p>
      </article>

      <article class="summary-card">
        <h3>Saved Jobs</h3>
        <p id="savedJobs">0</p>
      </article>

      <article class="summary-card">
        <h3>Applied</h3>
        <p id="appliedJobs">0</p>
      </article>

      <article class="summary-card">
        <h3>Interviews</h3>
        <p id="interviewJobs">0</p>
      </article>
    </section>

    <section class="controls" aria-label="Search and filter jobs">
      <label for="searchInput" class="sr-only">
        Search jobs
      </label>

      <input
        type="search"
        id="searchInput"
        placeholder="Search by job title, company or description..."
      >

      <label for="categoryFilter" class="sr-only">
        Filter by category
      </label>

      <select id="categoryFilter">
        <option value="all">All Categories</option>
        <option value="Cyber">Cyber</option>
        <option value="Data">Data</option>
        <option value="Project Management">
          Project Management
        </option>
        <option value="Development">Development</option>
      </select>

      <label for="typeFilter" class="sr-only">
        Filter by job type
      </label>

      <select id="typeFilter">
        <option value="all">All Types</option>
        <option value="Full Time">Full Time</option>
        <option value="Part Time">Part Time</option>
        <option value="Hybrid">Hybrid</option>
        <option value="Remote">Remote</option>
      </select>

      <label for="sortSelect" class="sr-only">
        Sort jobs
      </label>

      <select id="sortSelect">
        <option value="default">Sort: Default</option>
        <option value="company">Company A-Z</option>
        <option value="title">Job Title A-Z</option>
      </select>

      <button
        type="button"
        id="clearFiltersButton"
        class="secondary-button"
      >
        Clear Filters
      </button>
    </section>

    <p
      id="resultsMessage"
      class="results-message"
      aria-live="polite"
    ></p>

    <section
      id="jobsContainer"
      class="jobs-container"
      aria-label="Available jobs"
    >
      <!-- Job cards are created dynamically by JavaScript -->
    </section>
  </main>

  <footer class="app-footer">
    <p>CareerMatch Dashboard · Final Academic Project · 2026</p>
  </footer>

  <script src="src/jobs.js"></script>
  <script src="src/main.js"></script>
</body>
</html>
